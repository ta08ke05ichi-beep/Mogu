<!DOCTYPE html>
<html>

<head>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff8a65">

<link rel="apple-touch-icon" href="icons/mogu-192.png">

<link rel="icon" href="icons/mogu-192.png">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta charset="UTF-8">

<title>Mogu</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="card">

<div class="logo-area">

    <div class="mogu-logo">

        <div class="logo" id="home"></div>
        <div class="mogu-icon"></div>
        <div class="mogu-text">Mogu</div>

    </div>

</div>




<div id="searchPage">

<!-- レシピ検索 -->

<div class="search-area">

<input
id="searchBox"
placeholder="🔍 料理名や材料を入力"
oninput="searchRecipes()">

<button onclick="searchRecipes()">
🔍 探す
</button>

</div>

<div id="recipe-detail"></div>

<div id="searchResult"></div>

</div>

<div id="moodResult"></div>

<div class="diet-switch">

<button id="normalBtn"
class="diet-btn active"
onclick="changeDietMode('normal')">

🍽️ 通常

</button>

<button id="dietBtn"
class="diet-btn"
onclick="changeDietMode('diet')">

🥗 ダイエット

</button>

</div>


<br><br>

<div class="mogu-box">

<h2 class="mogu-heading">
🐻 Moguがおすすめ！
</h2>

<p class="mogu-title">
今日のごはん、Moguにまかせて😊🍽️
</p>

<div class="mogu-buttons">

<div class="mood-buttons">

<button class="mogu-btn" onclick="moodMenu('ガッツリ')">
😋 ガッツリ
</button>

<button class="mogu-btn" onclick="moodMenu('節約')">
💰 節約
</button>

<button class="mogu-btn" onclick="moodMenu('ヘルシー')">
🥗 ヘルシー
</button>

<button class="mogu-btn" onclick="moodMenu('時短')">
⚡ 時短
</button>

</div>

<button class="mogu-btn recommend-btn" onclick="recommendMenu()">
🍽 今日の献立を見る
</button>

</div>

<div id="moguResult"></div>

</div>



<!-- おすすめ -->
<div class="section">


<h2>🌟 おすすめレシピ</h2>


<div id="recommend"></div>


</div>



<!-- 買い物 -->
<div class="section">

<h2>📝 買い物メモ</h2>

<textarea 
id="shoppingMemo"
placeholder="買うものを書いてね&#13;&#10;例：&#13;&#10;卵&#13;&#10;牛乳&#13;&#10;玉ねぎ"
></textarea>

<br>

<button onclick="saveMemo()">
💾 保存
</button>


</div>



<!-- お気に入り -->
<div class="section">


<h2 id="favorite-title">
❤️ お気に入り (0件)
</h2>


<div id="favorites"></div>


</div>


</div>

<div class="bottom-nav">

<button onclick="goHome()">
<span class="nav-icon home-icon">⌂</span>
ホーム
</button>

<button onclick="goSearch()">
<span class="nav-icon search-icon">🔍</span>
検索
</button>

<button onclick="goFavorite()">
<span class="nav-icon heart-icon">♥</span>
お気に入り
</button>

<button onclick="goTimer()">
<span class="nav-icon timer-icon">⏱</span>
タイマー
</button>

</div>

<script src="app.js"></script>

<div id="finishPopup" class="finish-popup">

    <div class="finish-card">

        <div class="finish-icon">🍳</div>

        <h2>完成！</h2>

        <p>おいしくできたかな？😋</p>

        <button onclick="closePopup()">OK</button>

    </div>

</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js")
  .then(() => {
    console.log("Service Worker 登録成功");
  })
  .catch((error) => {
    console.log("登録失敗", error);
  });
}
</script>

</body>
</html>
